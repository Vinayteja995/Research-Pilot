services:
  backend-api:
    build:
      context: ./
      dockerfile: ./backend/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist SQLite databases and downloaded papers/compiled PDF folders
      - ./researchpilot.db:/app/researchpilot.db
      - ./backend/pdf_cache:/app/backend/pdf_cache
      - ./backend/reports:/app/backend/reports
      - ./backend/chroma_db:/app/backend/chroma_db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend-api
    restart: always
